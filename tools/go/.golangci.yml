version: "2"

linters:
  enable:
    - gofmt
    - govet
    - errcheck
    - staticcheck
    - unused
    - gosimple
    - ineffassign
    - typecheck
    - gosec
    - gocritic
    - misspell

linters-settings:
  govet:
    enable-all: true
  gofmt:
    simplify: true
  gosec:
    severity: medium
    confidence: medium

issues:
  max-issues-per-linter: 50
  max-same-issues: 5
  exclude-rules:
    - path: "_test.go"
      linters:
        - gosec
        - errcheck

run:
  timeout: 5m
  tests: true
